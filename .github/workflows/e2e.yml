name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  playwright-e2e:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-e2e'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Clone the repository code into the CI runner
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Install the pnpm package manager (must be before setup-node for caching)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      # Install Node.js with the specified version and enable pnpm caching
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Install project dependencies using the lockfile to ensure reproducible builds
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Install the browsers required by Playwright and their system dependencies
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # Execute Playwright End-to-End tests simulating real user flows
      - name: Run Playwright Tests
        run: pnpm test:e2e
        env:
          CI: true

      # Upload the test results/reports as an artifact for later inspection (even if tests fail)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
