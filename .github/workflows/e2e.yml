name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      SUPABASE_AUTH_REDIRECT_URI: http://localhost:3000/auth/callback
      SUPABASE_AUTH_GITHUB_CLIENT_ID: ci_test_github_id
      SUPABASE_AUTH_GITHUB_SECRET: ci_test_github_secret
      SUPABASE_AUTH_GOOGLE_CLIENT_ID: ci_test_google_id
      SUPABASE_AUTH_GOOGLE_SECRET: ci_test_google_secret
      SMTP_HOST: localhost
      SMTP_PORT: 587
      SMTP_KEY: ci_test_smtp_key

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium webkit --with-deps

      - name: Install Playwright System Dependencies
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium webkit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start Supabase
        run: supabase start

      - name: Verify Supabase Health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/rest/v1/ \
              -H "apikey: $NEXT_PUBLIC_SUPABASE_ANON_KEY" > /dev/null 2>&1; then
              echo "Supabase is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: Supabase not ready, waiting 5s..."
            sleep 5
          done
          echo "::error::Supabase failed to become healthy within 150s"
          supabase status
          exit 1

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build Next.js
        run: pnpm build

      - name: Run Playwright Tests
        run: PORT=3000 pnpm exec playwright test
        env:
          CI: true
          NODE_ENV: test

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/
          retention-days: 30
