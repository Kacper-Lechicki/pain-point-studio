name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  playwright-e2e:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-e2e'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Clone the repository code into the CI runner
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Verify that the current branch name follows the required naming convention
      - name: Check Branch Name
        if: github.event_name == 'pull_request'
        run: |
          BRANCH_NAME=${{ github.head_ref }}
          echo "Checking branch name: $BRANCH_NAME"
          if [[ ! "$BRANCH_NAME" =~ ^(fix|feat|docs|setup|test|release)\/.+ ]]; then
            echo "::error::Branch name '$BRANCH_NAME' does not match the allowed pattern: fix/..., feat/..., docs/..., setup/..., test/..., or release/..."
            exit 1
          fi

      # Install the pnpm package manager (must be before setup-node for caching)

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      # Install Node.js with the specified version and enable pnpm caching
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Install project dependencies using the lockfile to ensure reproducible builds
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Install the browsers required by Playwright and their system dependencies
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # Execute Playwright End-to-End tests simulating real user flows
      - name: Run Playwright Tests
        run: rm -rf .next && PORT=3333 pnpm exec playwright test
        env:
          CI: true
          NODE_ENV: test
          NEXT_PUBLIC_APP_URL: http://localhost:3333
          # Supabase local defaults for CI validation
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          # Auth & SMTP placeholders for CI validation
          SUPABASE_AUTH_REDIRECT_URI: http://localhost:3333/auth/callback
          SUPABASE_AUTH_GITHUB_CLIENT_ID: ci_test_github_id
          SUPABASE_AUTH_GITHUB_SECRET: ci_test_github_secret
          SUPABASE_AUTH_GOOGLE_CLIENT_ID: ci_test_google_id
          SUPABASE_AUTH_GOOGLE_SECRET: ci_test_google_secret
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_KEY: ci_test_smtp_key

      # Upload the test results/reports as an artifact for later inspection (even if tests fail)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
