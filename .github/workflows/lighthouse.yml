name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    types: [labeled]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    if: contains(github.event.label.name, 'run-lighthouse')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: pnpm test:lighthouse
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_AUTH_REDIRECT_URI: http://localhost:3000/auth/callback
          SUPABASE_AUTH_GITHUB_CLIENT_ID: placeholder
          SUPABASE_AUTH_GITHUB_SECRET: placeholder
          SUPABASE_AUTH_GOOGLE_CLIENT_ID: placeholder
          SUPABASE_AUTH_GOOGLE_SECRET: placeholder
          SMTP_HOST: placeholder
          SMTP_PORT: 587
          SMTP_KEY: placeholder

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: reports/lighthouse/
          retention-days: 14
